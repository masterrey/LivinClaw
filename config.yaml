agent:
  name: "MiniClaw Alive"
  tick_minutes: 10
  max_tasks_per_tick: 3
  reflection_enabled: true
  max_short_summary_chars: 500

guardian:
  enabled: true
  check_every_ticks: 6
  max_guardian_tokens: 3000
  main_context_limit: 16000
  safe_context_ratio: 0.70

model:
  provider: "lmstudio"
  base_url: "http://127.0.0.1:1234/v1"
  model: "qwen/qwen3.5-9b"
  temperature: 0.3

paths:
  tasks: "workspace/tasks.md"
  memory_dir: "workspace/memory"
  logs_dir: "workspace/logs"

memory:
  max_loaded_topics: 3
  topic_memory_enabled: true
  importance_decay: 0.95

cognitive_budget:
  max_tokens_per_tick: 12000
  max_loaded_topics: 3
  max_reflections_per_day: 20
  reflection_cooldown_ticks: 3
  max_compactions_per_hour: 2

reflection:
  enabled: true
  cooldown_ticks: 3
  max_per_day: 20

interaction:
  enabled: true
  interactive_tick_enabled: true
  inbox_path: "workspace/inbox.md"
  outbox_path: "workspace/outbox.md"
  max_queue_size: 100

interactive_tick:
  reflection_enabled: false
  memory_compaction_enabled: false
  max_loaded_topics: 2
  max_tokens: 4000
  prioritize_inbox: true
  max_messages_per_tick: 3
